# Nginx Configuration for 3d.next.lc
# Serves static assets directly, proxies dynamic requests to Next.js
#
# Performance benefits:
# - Static assets bypass Next.js completely
# - Long cache headers for immutable assets
# - Gzip compression for text-based assets
# - CORS headers for cross-origin 3D model loading
#
# Place this file in /etc/nginx/sites-available/ and symlink to sites-enabled/
# Or include it in your main nginx.conf

server {
    listen 80;
    server_name 3d.next.lc;

    # Root directory for static files
    # Adjust this path to match your deployment
    root /var/www/cue-customizer-nextjs/public;

    # Enable gzip for compressible content
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;

    # ============================================
    # STATIC ASSETS - Serve directly from nginx
    # ============================================

    # GLB 3D Models - Already compressed, immutable
    location /models/ {
        alias /var/www/cue-customizer-nextjs/public/models/;
        
        # Immutable cache - 1 year (files are versioned/hashed)
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # CORS for Three.js cross-origin loading
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept";
        
        # GLB files are already compressed, disable gzip
        gzip off;
        
        # Proper MIME type for GLB
        types {
            model/gltf-binary glb;
        }
        
        # Enable sendfile for efficient file transfer
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            return 204;
        }
    }

    # Textures - Leather, defaults, surfaces
    location /textures/ {
        alias /var/www/cue-customizer-nextjs/public/textures/;
        
        # Long cache - 1 year for immutable assets
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # CORS for Three.js texture loading
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        
        # Pre-compressed files if available
        gzip_static on;
        
        # Image MIME types
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
        }
        
        sendfile on;
    }

    # Surface images
    location /surface/ {
        alias /var/www/cue-customizer-nextjs/public/surface/;
        
        # Medium cache - 1 day (surfaces may change)
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        
        sendfile on;
    }

    # Logo
    location = /logo.png {
        alias /var/www/cue-customizer-nextjs/public/logo.png;
        add_header Cache-Control "public, max-age=31536000, immutable";
        sendfile on;
    }

    # ============================================
    # NEXT.JS PROXY - Dynamic requests
    # ============================================

    location / {
        proxy_pass https://3d.next.lc;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        
        # WebSocket support for HMR (development)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Preserve original host and client info
        proxy_set_header Host 3d.next.lc;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Bypass cache for dynamic content
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Next.js static files - let Next.js handle with its own caching
    location /_next/static/ {
        proxy_pass https://3d.next.lc;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 3d.next.lc;
        
        # Next.js static files are immutable
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API routes - no caching
    location /api/ {
        proxy_pass https://3d.next.lc;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host 3d.next.lc;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

